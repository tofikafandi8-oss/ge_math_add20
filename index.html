<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Math Space Academy - Arithmetica Light</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-bg: #e0f2fe;
            --main-blue: #0ea5e9;
            --main-orange: #f59e0b;
            --soft-white: #ffffff;
            --text-dark: #0f172a;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--sky-bg);
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            height: 100vh;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #bae6fd 0%, #e0f2fe 100%);
            transition: all 0.3s ease;
        }

        /* Pseudo Fullscreen Mode */
        body.pseudo-fullscreen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: white;
        }

        .title-font { font-family: 'Fredoka', sans-serif; }

        .decor-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .floating-item {
            position: absolute; opacity: 0.6;
            animation: float var(--duration) ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 4px solid var(--soft-white);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.15);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            overflow-y: auto;
        }

        .hidden-screen { display: none !important; }

        .opt-btn {
            background: var(--soft-white);
            border: 3px solid #e2e8f0;
            border-radius: 16px;
            color: var(--text-dark);
            font-weight: 700;
            padding: 8px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
            font-size: 1.25rem;
            box-shadow: 0 4px 0 #cbd5e1;
        }
        
        .opt-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #cbd5e1; }
        .opt-btn.correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; box-shadow: 0 4px 0 #16a34a !important; }
        .opt-btn.wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; box-shadow: 0 4px 0 #dc2626 !important; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: var(--soft-white); z-index: 100;
            border-top: 3px solid #e2e8f0;
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
        }

        .control-btn {
            width: 36px; height: 36px; background: #f1f5f9; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 2px solid #e2e8f0; color: var(--main-blue); margin-left: 4px;
            font-size: 0.9rem;
        }

        main { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; padding: 10px; padding-bottom: 70px; z-index: 10; overflow: hidden; }

        .q-image-container {
            background: #f8fafc; 
            border: 3px dashed #cbd5e1;
            border-radius: 20px; 
            margin-bottom: 10px;
            display: flex; 
            justify-content: center; 
            align-content: center;
            align-items: center; 
            padding: 12px; 
            width: 100%; 
            min-height: 140px;
            max-height: 200px;
            overflow-y: auto;
            flex-wrap: wrap;
            gap: 4px;
        }

        .q-text-area {
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            text-align: center;
        }

        .tug-container {
            width: 100%; height: 32px; background: #334155; border-radius: 16px;
            position: relative; overflow: hidden; border: 4px solid white;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        .tug-bar {
            height: 100%; width: 50%;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: absolute;
        }
        .bar-left {
            left: 0; background: #0ea5e9;
            box-shadow: 10px 0 20px rgba(14, 165, 233, 0.6);
        }
        .bar-right {
            right: 0; background: #f59e0b;
            box-shadow: -10px 0 20px rgba(245, 158, 11, 0.6);
        }
        .tug-center {
            position: absolute; left: 50%; top: 0; bottom: 0; width: 6px;
            background: white; transform: translateX(-50%); z-index: 10;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        .glow-active {
            animation: pulse-glow 1s ease-in-out infinite alternate;
        }
        @keyframes pulse-glow {
            from { filter: brightness(1) saturate(1); }
            to { filter: brightness(1.5) saturate(1.5); box-shadow: 0 0 30px currentColor; }
        }

        #audio-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); z-index: 200;
            display: none; align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(4px);
        }

        .vol-slider { -webkit-appearance: none; width: 100%; height: 8px; background: #e2e8f0; border-radius: 10px; outline: none; }
        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 24px; background: var(--main-blue); border-radius: 50%; cursor: pointer; border: 3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .item-icon { 
            filter: drop-shadow(1px 1px 0px white);
            transition: all 0.2s;
        }
        .size-small { font-size: 1.25rem; }
        .size-med { font-size: 2rem; }
        .size-large { font-size: 2.8rem; }
    </style>
</head>

    <!-- Audio Elements -->
    <audio id="audio-menu" loop crossorigin="anonymous" src="https://cdn.pixabay.com/audio/2021/11/14/audio_98553272d5.mp3"></audio>
    <audio id="audio-game" loop crossorigin="anonymous" src="https://cdn.pixabay.com/audio/2022/02/15/audio_51770b7f8e.mp3"></audio>

    <script>
        let gameMode = 1, scores = [0, 0], qIndices = [0, 0], selectedLevel = 1;
        let finishTimes = [0, 0], startTime = 0;
        let questions = [[], []], processing = [false, false];
        let currentMusicType = 'none';
        
        let infinityBalance = 50; 
        let infinityWinner = null;

        let audioCtx, musicGain, sfxGain, audioInit = false;
        let synthMusicActive = false;
        let synthInterval;

        async function setupAudio() {
            if(audioInit) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                musicGain = audioCtx.createGain();
                sfxGain = audioCtx.createGain();
                musicGain.connect(audioCtx.destination);
                sfxGain.connect(audioCtx.destination);
                
                const menuEl = document.getElementById('audio-menu');
                const gameEl = document.getElementById('audio-game');
                
                try {
                    const menuSource = audioCtx.createMediaElementSource(menuEl);
                    const gameSource = audioCtx.createMediaElementSource(gameEl);
                    menuSource.connect(musicGain);
                    gameSource.connect(musicGain);
                } catch(e) {
                    synthMusicActive = true;
                }
                
                musicGain.gain.value = 0.5;
                sfxGain.gain.value = 0.7;
                audioInit = true;
                
                if(audioCtx.state === 'suspended') await audioCtx.resume();
            } catch(e) { 
                synthMusicActive = true;
            }
        }

        function playSynthMusic(type) {
            if (!audioInit) return;
            stopSynthMusic();
            const tempo = type === 'menu' ? 500 : 300;
            const notes = type === 'menu' ? [261.63, 329.63, 392.00, 523.25] : [196.00, 220.00, 246.94, 261.63];
            let step = 0;
            synthInterval = setInterval(() => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
                g.gain.setValueAtTime(0.05 * musicGain.gain.value, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc.connect(g);
                g.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
                step++;
            }, tempo);
        }

        function stopSynthMusic() { if(synthInterval) clearInterval(synthInterval); }

        async function initApp() {
            await setupAudio();
            ensureAudioPlay('menu');
            switchScreen('level');
            chime('click');
        }

        function forceResumeAudio() { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }
        function updateMusicVol(v) { if(musicGain) musicGain.gain.value = v / 100; document.getElementById('music-val').innerText = v + '%'; }
        function updateSFXVol(v) { if(sfxGain) sfxGain.gain.value = v / 100; document.getElementById('sfx-val').innerText = v + '%'; }
        function toggleAudioSettings() { forceResumeAudio(); const el = document.getElementById('audio-overlay'); el.style.display = (el.style.display === 'flex') ? 'none' : 'flex'; }

        function chime(type = 'correct') {
            if(!audioInit || !audioCtx) return;
            forceResumeAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(sfxGain);
            const now = audioCtx.currentTime;
            if (type === 'correct') {
                o.type = 'sine'; o.frequency.setValueAtTime(800, now);
                o.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                o.start(); o.stop(now + 0.3);
            } else if (type === 'wrong') {
                o.type = 'triangle'; o.frequency.setValueAtTime(200, now);
                o.frequency.linearRampToValueAtTime(100, now + 0.2);
                g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                o.start(); o.stop(now + 0.4);
            } else if (type === 'click') {
                o.type = 'sine'; o.frequency.setValueAtTime(440, now);
                g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                o.start(); o.stop(now + 0.1);
            }
        }

        function ensureAudioPlay(type) {
            forceResumeAudio();
            if (synthMusicActive) { playSynthMusic(type); return; }
            const menu = document.getElementById('audio-menu');
            const game = document.getElementById('audio-game');
            if (type === currentMusicType) {
                const active = type === 'menu' ? menu : game;
                if (active.paused) active.play().catch(() => { synthMusicActive = true; playSynthMusic(type); });
                return;
            }
            menu.pause(); game.pause();
            currentMusicType = type;
            const target = type === 'menu' ? menu : game;
            target.currentTime = 0;
            target.play().catch(() => { synthMusicActive = true; playSynthMusic(type); });
        }

        function generateQuestions(lvl, count = 10) {
            let qSet = [];
            const icons = ["🚀", "🛸", "🪐", "👽", "⭐", "💎", "🌞", "🛰️", "🤖", "🌈"];
            for(let i=0; i<count; i++) {
                let questionObj = {};
                if(lvl === 1) {
                    let countNum = Math.floor(Math.random() * 20) + 1;
                    let icon = icons[Math.floor(Math.random() * icons.length)];
                    let display = "";
                    let sizeClass = countNum > 12 ? "size-small" : (countNum > 6 ? "size-med" : "size-large");
                    for(let j=0; j<countNum; j++) display += `<span class="item-icon ${sizeClass}">${icon}</span>`;
                    questionObj = { img: display, q: "Berapa jumlah benda?", a: countNum.toString(), opts: generateOptions(countNum, 1, 25) };
                } else if(lvl === 2) {
                    let a = Math.floor(Math.random() * 11) + 1;
                    let b = Math.floor(Math.random() * (20 - a + 1));
                    let ans = a + b;
                    questionObj = { img: `<div class="text-5xl font-bold text-sky-500">${a} + ${b}</div>`, q: "Hasil penjumlahan?", a: ans.toString(), opts: generateOptions(ans, 0, 20) };
                } else {
                    let a = Math.floor(Math.random() * 11) + 10;
                    let b = Math.floor(Math.random() * a);
                    let ans = a - b;
                    questionObj = { img: `<div class="text-5xl font-bold text-rose-500">${a} - ${b}</div>`, q: "Hasil pengurangan?", a: ans.toString(), opts: generateOptions(ans, 0, 20) };
                }
                qSet.push(questionObj);
            }
            return qSet;
        }

        function generateOptions(correct, min, max) {
            let options = [correct.toString()];
            correct = parseInt(correct);
            let traps = [correct - 1, correct + 1, correct - 2, correct + 2].filter(t => t >= min && t <= max && t !== correct);
            traps.sort(() => Math.random() - 0.5);
            for (let t of traps) if (options.length < 4) { let s = t.toString(); if (!options.includes(s)) options.push(s); }
            while (options.length < 4) {
                let offset = Math.floor(Math.random() * 7) - 3;
                let rand = (correct + offset).toString();
                if (!options.includes(rand) && parseInt(rand) >= min) options.push(rand);
                else { let ar = (Math.floor(Math.random() * (max - min + 1)) + min).toString(); if (!options.includes(ar)) options.push(ar); }
            }
            return options.sort(() => Math.random() - 0.5);
        }

        function selectLevel(l) { selectedLevel = l; chime('click'); switchScreen('mode'); }
        function selectMode(m) { gameMode = m; chime('click'); startGame(); }

        function startGame() {
            scores=[0,0]; qIndices=[0,0]; finishTimes=[0,0]; processing=[false,false];
            infinityBalance = 50; infinityWinner = null;
            const qCount = gameMode === 3 ? 100 : 10;
            questions[0] = generateQuestions(selectedLevel, qCount);
            questions[1] = (gameMode >= 2) ? generateQuestions(selectedLevel, qCount) : [];
            startTime = Date.now();
            ensureAudioPlay('game');
            if(gameMode === 1) { switchScreen('game-single'); renderQ(0); }
            else { 
                setupBattleUI(); switchScreen('game-battle');
                const barCont = document.getElementById('infinity-bar-container');
                if(gameMode === 3) { barCont.classList.remove('hidden'); updateInfinityUI(); }
                else barCont.classList.add('hidden');
                renderQ(0); renderQ(1); 
            }
        }

        function updateInfinityUI() {
            const barL = document.getElementById('infinity-bar-progress-left');
            const barR = document.getElementById('infinity-bar-progress-right');
            barL.style.width = (100 - infinityBalance) + '%';
            barR.style.width = infinityBalance + '%';
            barL.classList.remove('glow-active');
            barR.classList.remove('glow-active');
            if(infinityBalance <= 20) barL.classList.add('glow-active');
            if(infinityBalance >= 80) barR.classList.add('glow-active');
        }

        function setupBattleUI() {
            const container = document.getElementById('battle-container');
            container.innerHTML = '';
            for(let i=0; i<2; i++) {
                const color = i === 0 ? 'sky' : 'orange';
                container.innerHTML += `
                <div id="p-panel-${i}" class="glass-panel p-4 border-4 border-${color}-200 overflow-hidden">
                    <div id="p-active-${i}" class="flex flex-col h-full">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-${color}-600 font-bold text-[9px] uppercase">PILOT ${i+1} ${gameMode === 3 ? '• INFINITY' : '• <span id="num-b-'+i+'">1</span>/10'}</span>
                            <span class="text-[9px] bg-${color}-100 px-2 py-0.5 rounded-full font-bold text-${color}-700">SKOR: <span id="score-b-${i}">0</span></span>
                        </div>
                        <div id="q-img-b-${i}" class="q-image-container h-[120px] min-h-[120px]"></div>
                        <div class="q-text-area">
                            <h2 id="q-text-b-${i}" class="text-slate-700 text-xs font-bold text-center">...</h2>
                        </div>
                        <div id="opts-b-${i}" class="grid grid-cols-2 gap-2 mb-2"></div>
                    </div>
                    <div id="p-waiting-${i}" class="hidden py-10 text-center">
                        <i class="fas fa-check-circle text-4xl text-green-500 mb-4"></i>
                        <div class="title-font text-base text-slate-600 uppercase">SELESAI!</div>
                        <div class="text-[9px] text-slate-400 font-bold">Menunggu Pilot Lain...</div>
                    </div>
                </div>`;
            }
        }

        function renderQ(p) {
            if(infinityWinner !== null) return;
            const prefix = gameMode === 1 ? 's' : 'b';
            if(gameMode !== 3 && qIndices[p] >= 10) {
                finishTimes[p] = (Date.now() - startTime) / 1000;
                if(gameMode === 2) {
                    document.getElementById(`p-active-${p}`).classList.add('hidden');
                    document.getElementById(`p-waiting-${p}`).classList.remove('hidden');
                }
                checkEnd(); return;
            }
            if(qIndices[p] >= questions[p].length) {
                questions[p] = questions[p].concat(generateQuestions(selectedLevel, 20));
            }
            const q = questions[p][qIndices[p]];
            document.getElementById(`q-img-${prefix}-${p}`).innerHTML = q.img;
            document.getElementById(`q-text-${prefix}-${p}`).innerText = q.q;
            if(gameMode !== 3) document.getElementById(`num-${prefix}-${p}`).innerText = qIndices[p] + 1;
            document.getElementById(`score-${prefix}-${p}`).innerText = scores[p];
            const optBox = document.getElementById(`opts-${prefix}-${p}`);
            optBox.innerHTML = '';
            q.opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn'; btn.innerText = o;
                btn.onclick = () => {
                    if(processing[p] || infinityWinner !== null) return; 
                    processing[p]=true;
                    if(o === q.a) { 
                        btn.classList.add('correct'); scores[p]+=10; chime('correct');
                        if(gameMode === 3) {
                            infinityBalance += (p === 0 ? -6 : 6);
                            if(infinityBalance <= 0) { infinityBalance = 0; infinityWinner = 1; updateInfinityUI(); checkEnd(); return; }
                            if(infinityBalance >= 100) { infinityBalance = 100; infinityWinner = 2; updateInfinityUI(); checkEnd(); return; }
                            updateInfinityUI();
                        }
                    } else { 
                        btn.classList.add('wrong'); chime('wrong'); 
                        if(gameMode === 3) {
                            infinityBalance += (p === 0 ? 4 : -4);
                            if(infinityBalance <= 0) { infinityBalance = 0; infinityWinner = 1; updateInfinityUI(); checkEnd(); return; }
                            if(infinityBalance >= 100) { infinityBalance = 100; infinityWinner = 2; updateInfinityUI(); checkEnd(); return; }
                            updateInfinityUI();
                        }
                    }
                    setTimeout(() => { qIndices[p]++; processing[p]=false; renderQ(p); }, 400);
                };
                optBox.appendChild(btn);
            });
        }

        function checkEnd() {
            let isEnd = false;
            if(gameMode === 1) isEnd = (qIndices[0] >= 10);
            else if(gameMode === 2) isEnd = (qIndices[0] >= 10 && qIndices[1] >= 10);
            else if(gameMode === 3) isEnd = (infinityWinner !== null);

            if(isEnd) {
                ensureAudioPlay('menu');
                const body = document.getElementById('res-body');
                if(gameMode === 1) {
                    const fs = scores[0];
                    let msg = fs >= 80 ? "Hebat! Kamu Pintar Sekali!" : (fs >= 50 ? "Bagus! Terus Berlatih!" : "Coba Lagi Ya!");
                    body.innerHTML = `
                        <div class="text-6xl font-bold text-sky-600 mb-2">${fs}</div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase mb-8">${msg}</p>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-sky-50 p-4 rounded-2xl border-2 border-sky-100"><div class="text-[8px] text-sky-600 font-bold mb-1">BENAR</div><div class="text-xl font-bold">${fs/10}</div></div>
                            <div class="bg-orange-50 p-4 rounded-2xl border-2 border-orange-100"><div class="text-[8px] text-orange-600 font-bold mb-1">WAKTU</div><div class="text-xl font-bold">${((Date.now()-startTime)/1000).toFixed(1)}s</div></div>
                        </div>`;
                } else {
                    const win = gameMode === 3 ? infinityWinner : (scores[0] > scores[1] ? 1 : (scores[1] > scores[0] ? 2 : (finishTimes[0] < finishTimes[1] ? 1 : 2)));
                    body.innerHTML = `
                        <div class="text-lg font-bold text-rose-600 mb-6 uppercase tracking-wider">${gameMode === 3 ? 'POIN LAWAN HABIS!' : 'HASIL PERTANDINGAN'}</div>
                        <div class="mb-6 title-font text-2xl text-sky-600 uppercase">PILOT ${win} PEMENANGNYA!</div>
                        <div class="space-y-3">${[0,1].map(i => `
                            <div class="p-4 rounded-2xl border-4 ${win===(i+1) ? 'border-sky-400 bg-sky-50' : 'border-slate-100 bg-white'} flex justify-between items-center">
                                <div class="text-left"><div class="text-xs font-bold">PILOT ${i+1}</div><div class="text-[9px] text-slate-400 font-bold">${scores[i]} TOTAL POIN</div></div>
                                <div class="text-3xl font-bold ${win===(i+1) ? 'text-sky-600' : 'text-slate-400'}">${scores[i]}</div>
                            </div>`).join('')}
                        </div>`;
                }
                switchScreen('result');
            }
        }

        function switchScreen(id) {
            document.querySelectorAll('main > div').forEach(s => s.classList.add('hidden-screen'));
            document.getElementById('screen-' + id).classList.remove('hidden-screen');
        }

        function resetToMenu() { switchScreen('level'); ensureAudioPlay('menu'); chime('click'); }

        /**
         * FIX: Menggunakan Pseudo Fullscreen alih-alih Native Fullscreen API 
         * karena kebijakan permission browser di dalam iframe seringkali memblokir requestFullscreen.
         */
        function togglePseudoFullScreen() {
            const body = document.getElementById('app-body');
            const icon = document.getElementById('fs-icon');
            const isFS = body.classList.toggle('pseudo-fullscreen');
            
            if(isFS) {
                icon.classList.remove('fa-expand');
                icon.classList.add('fa-compress');
            } else {
                icon.classList.remove('fa-compress');
                icon.classList.add('fa-expand');
            }
            chime('click');
        }

        (function createDecor() {
            const bg = document.getElementById('decor-bg');
            const items = ['☁️', '⭐', '🎈', '☁️', '🪐'];
            for(let i=0; i<15; i++) {
                const s = document.createElement('div'); s.className='floating-item';
                s.innerText = items[i % items.length]; s.style.fontSize = (Math.random()*15+15)+'px';
                s.style.top = Math.random()*90+'%'; s.style.left = Math.random()*90+'%';
                s.style.setProperty('--duration', (Math.random()*3+3)+'s'); bg.appendChild(s);
            }
        })();

        window.addEventListener('mousedown', forceResumeAudio);
        window.addEventListener('touchstart', forceResumeAudio);
    </script>
</body>
</html>
